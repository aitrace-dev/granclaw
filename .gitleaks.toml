# gitleaks config for GranClaw's prepublish gate.
#
# This tuning excludes runtime state, build artifacts, and package-locks that
# are not part of the shipped tarball. The gate scans the working tree AND the
# built dist/ separately, so excluding them here only affects the working-tree
# scan — any secret that makes it into dist/ is still caught.
[extend]
useDefault = true

[allowlist]
description = "GranClaw prepublish-gate allowlist"
paths = [
  # Never ship-relevant
  '''node_modules/''',
  '''\.git/''',
  '''package-lock\.json$''',

  # Runtime state, gitignored, never packed
  '''^data/''',
  '''^workspaces/''',
  '''^vault/''',
  '''^\.docker-claude/''',
  '''^landing/''',
  '''^test-results/''',
  '''^\.playwright-mcp/''',

  # Internal dev docs (gitignored)
  '''^docs/superpowers/''',

  # Untracked landing screenshots sitting at the repo root
  '''^granclaw-landing-.*\.png$''',
  '''^landing-.*\.png$''',
  '''^lightbox-open\.png$''',
  '''^img\.png$''',

  # Build caches/artifacts
  '''^packages/frontend/dist/''',
  '''^packages/backend/dist/''',

  # Claude Code slash-command test fixtures — contain intentional dummy
  # secrets like "stolen-key-123" used to exercise the secrets UI
  '''^\.claude/commands/''',

  # Vendored research checkouts — third-party repos cloned for reference,
  # contain their own test fixtures with intentional dummy secrets, never
  # shipped in the granclaw tarball. Also excluded from vitest and root
  # package.json.
  '''^\.research/''',

  # Git worktree workspaces — isolated branch copies, never shipped
  '''^\.worktrees/''',

  # Enterprise (GranClaw Self-Hosted) — separate git repo, gitignored,
  # never shipped with the OSS runtime. Contains its own Next.js build
  # cache with framework-internal keys.
  '''^enterprise/''',

  # Local developer credentials — gitignored, never shipped. dist/ is
  # scanned separately so this only affects the working-tree scan.
  '''^providers\.config\.json$''',
  '''^\.env$''',
  '''^\.env\..*''',
]
