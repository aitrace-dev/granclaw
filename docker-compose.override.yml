# Stealth test override.
# Adds env vars that mirror the production cloud instances,
# so you can test browser stealth locally.
#
# Usage:
#   docker compose up --build          (this file is auto-loaded)
#   docker compose -f docker-compose.yml up --build   (skip this override)

services:
  granclaw:
    environment:
      GRANCLAW_HOME: "/app"
    volumes:
      # Mount local providers.config.json so the backend can authenticate
      # with whatever provider you have configured (Anthropic, OpenRouter, etc.)
      - ./providers.config.json:/app/providers.config.json:ro
